{% extends "dashboards/base.html" %}
{% load plotly_dash %}
{% block title %}Performance : Direction{% endblock %}
{% block extra_head %}{% plotly_header %}{% endblock %}
{% block content %}
    <div class="d-sm-flex align-items-center justify-content-between mb-4">
        <h1 class="h3 mb-0 text-gray-800"><i class="fas fa-chart-line mr-2 text-primary"></i>Performance : Direction</h1>
    </div>
    <!-- Pas de .shadow ici : son flou (1.75rem, cf. cie-admin-2.min.css) "bave"
         visiblement dans l'espace vide entre le titre et la carte, faute d'autre
         contenu pour l'absorber visuellement (retour utilisateur explicite). -->
    <div class="card mb-4">
        <div class="card-body">
            {% plotly_app name="PerformanceDirection" height="1650px" %}
        </div>
    </div>
{% endblock %}

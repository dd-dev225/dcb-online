{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Fiche envoyée : CIE</title>
    <link href="https://fonts.googleapis.com/css?family=Nunito:300,400,600,700,800" rel="stylesheet">
    <link href="{% static 'dashboards/vendor/fontawesome-free/css/all.min.css' %}" rel="stylesheet" type="text/css">
    <link href="{% static 'dashboards/css/cie-admin-2.min.css' %}" rel="stylesheet">
</head>
<body class="bg-gradient-primary">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-xl-6 col-lg-7 col-md-9">
            <div class="card o-hidden border-0 shadow-lg my-5">
                <div class="card-body p-5 text-center">
                    <img src="{% static 'dashboards/img/on_line_r.png' %}" alt="CIE" style="width: 5rem; height: 5rem; object-fit: contain;">
                    <i class="fas fa-check-circle fa-3x text-success d-block my-3"></i>
                    <h1 class="h4 text-gray-900 mb-2">Merci pour votre réclamation</h1>
                    <p class="text-gray-600">Elle a bien été enregistrée pour <strong>{{ fiche.nom_entreprise }}</strong> et sera transmise au Support Technique de la CIE dans les meilleurs délais.</p>
                    <p class="text-gray-500 small mb-0">Direction Clientèle Business, CIE</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
